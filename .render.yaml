services:
  - type: web
    name: brokercrm
    env: python

    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate

    startCommand: gunicorn brokercrm.wsgi:application

    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: False

      - key: EMAIL_USER
        sync: false

      - key: EMAIL_PASSWORD
        sync: false
