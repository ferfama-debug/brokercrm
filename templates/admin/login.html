{% extends "admin/login.html" %}
{% load static %}

{% block extrastyle %}
<style>
    body {
        background: url("{% static 'images/img/fondo.png' %}") no-repeat center center fixed !important;
        background-size: cover !important;
    }

    .login-box {
        background: rgba(255, 255, 255, 0.9);
        border-radius: 10px;
        padding: 20px;
    }

    .login-logo img {
        max-width: 180px;
        height: auto;
    }
</style>
{% endblock %}

{% block content_title %}
<h2 style="text-align:center;">
    Ingreso Para Productores
</h2>
{% endblock %}

{% block logo %}
<div class="login-logo" style="text-align:center; margin-bottom: 20px;">
    <img src="{% static 'images/img/logo.png' %}" alt="Logo">
</div>
{% endblock %}
