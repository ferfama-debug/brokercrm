{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión | Fuerza Natural Broker</title>
    <link rel="stylesheet" href="{% static 'images/css/crm.css' %}">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'DM Sans', system-ui, sans-serif;
            background: linear-gradient(135deg, #04110b 0%, #071a12 50%, #0a2217 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-shell {
            width: 100%;
            max-width: 460px;
        }

        .login-card {
            background: rgba(10, 22, 16, 0.96);
            border: 1px solid rgba(52, 211, 100, 0.14);
            border-radius: 22px;
            padding: 30px 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(8px);
        }

        .login-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
        }

        .logo {
            width: 94px;
            height: 94px;
            object-fit: contain;
            display: block;
        }

        .login-title {
            margin: 0 0 6px 0;
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #ecfdf5;
        }

        .login-subtitle {
            margin: 0 0 24px 0;
            text-align: center;
            font-size: 14px;
            color: #86efac;
        }

        form p {
            margin: 0 0 16px 0;
        }

        form label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #d1fae5;
        }

        form input {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid rgba(52, 211, 100, 0.16);
            background: #08150f;
            color: #ecfdf5;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 14px;
            outline: none;
            transition: border-color .2s ease, box-shadow .2s ease;
        }

        form input:focus {
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.14);
        }

        form ul,
        .errorlist {
            margin: 8px 0 0 0;
            padding-left: 18px;
            color: #fca5a5;
            font-size: 12px;
        }

        .btn {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #22c55e, #15803d);
            color: #ffffff;
            transition: transform .15s ease, box-shadow .15s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(21, 128, 61, 0.28);
        }

        @media (max-width: 520px) {
            .login-card {
                padding: 24px 18px;
                border-radius: 18px;
            }

            .logo {
                width: 82px;
                height: 82px;
            }

            .login-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

<div class="login-shell">
    <div class="login-card">

        <div class="login-brand">
            <img src="{% static 'images/img/logo.png' %}" class="logo" alt="Fuerza Natural Broker">
        </div>

        <h2 class="login-title">Iniciar sesión</h2>
        <p class="login-subtitle">Accedé a tu panel de gestión</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button class="btn" type="submit">Ingresar</button>
        </form>

    </div>
</div>

</body>
</html>
