{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuerza Natural Broker — Ingreso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-base:    #050d0a;
  --bg-card:    #0a1610;
  --border:     rgba(52, 211, 100, 0.08);
  --border-strong: rgba(52, 211, 100, 0.18);
  --green-300:  #6ee7b7;
  --green-400:  #34d364;
  --green-500:  #22c55e;
  --green-600:  #16a34a;
  --green-700:  #15803d;
  --green-900:  #052e16;
  --text-primary:   #ecfdf5;
  --text-secondary: #86efac;
  --text-muted:     #4d7c60;
  --font-sans: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'DM Mono', monospace;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
}

html, body {
  height: 100%;
  font-family: var(--font-sans);
  background: var(--bg-base);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
}

/* FONDO CON PATRÓN SUTIL */
body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(22, 163, 74, 0.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(52, 211, 100, 0.04) 0%, transparent 50%);
}

/* CARD DE LOGIN */
.login-card {
  width: 100%;
  max-width: 420px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(52, 211, 100, 0.04),
    0 24px 64px rgba(0, 0, 0, 0.5);
}

/* HEADER DE LA CARD */
.login-header {
  padding: 36px 36px 28px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}

.login-isotipo {
  width: 56px;
  height: 56px;
  margin: 0 auto 16px;
}

.login-titulo {
  font-size: 20px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.01em;
  margin-bottom: 4px;
}

.login-subtitulo {
  font-size: 13px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  font-weight: 500;
}

/* FORMULARIO */
.login-body {
  padding: 28px 36px 32px;
}

.form-grupo {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 16px;
}

.form-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.04em;
}

.input-wrap {
  position: relative;
}

.input-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 15px;
  height: 15px;
  color: var(--text-muted);
  pointer-events: none;
}

.form-input {
  width: 100%;
  background: #060f0b;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 11px 12px 11px 36px;
  font-family: var(--font-sans);
  font-size: 14px;
  color: var(--text-primary);
  transition: border-color 0.18s, box-shadow 0.18s;
  outline: none;
}

.form-input::placeholder { color: var(--text-muted); }

.form-input:focus {
  border-color: var(--green-600);
  box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.12);
}

/* BOTÓN */
.btn-login {
  width: 100%;
  margin-top: 8px;
  padding: 12px;
  background: var(--green-600);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.18s ease;
  letter-spacing: 0.02em;
}

.btn-login:hover {
  background: var(--green-500);
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(22, 163, 74, 0.35);
}

.btn-login:active {
  transform: translateY(0);
}

/* ERRORES */
.error-msg {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(239, 68, 68, 0.08);
  border: 1px solid rgba(239, 68, 68, 0.2);
  border-left: 3px solid #ef4444;
  color: #fca5a5;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  margin-bottom: 16px;
}

.error-msg svg { width: 14px; height: 14px; flex-shrink: 0; }

/* FOOTER */
.login-footer {
  padding: 14px 36px;
  border-top: 1px solid var(--border);
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  letter-spacing: 0.04em;
}

</style>
</head>
<body>

<div class="login-card">

  <!-- HEADER -->
  <div class="login-header">
    <svg class="login-isotipo" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="56" height="56" rx="14" fill="#0a1f12"/>
      <path d="M28 8 C28 8, 44 14, 44 30 C44 40, 35 44, 28 42 C21 44, 12 40, 12 30 C12 14, 28 8 Z"
            fill="#15803d" opacity="0.9"/>
      <path d="M28 42 L28 14" stroke="#34d364" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M28 34 Q21 31, 16 32" stroke="#34d364" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
      <path d="M28 27 Q35 24, 40 25" stroke="#34d364" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
      <path d="M28 38 Q35 35, 40 36" stroke="#34d364" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
    </svg>

    <div class="login-titulo">Fuerza Natural Broker</div>
    <div class="login-subtitulo">Ingreso para productores</div>
  </div>

  <!-- FORMULARIO -->
  <div class="login-body">

    {% if form.errors %}
    <div class="error-msg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      Usuario o contraseña incorrectos.
    </div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}

      <div class="form-grupo">
        <label class="form-label">Usuario</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input
            type="text"
            name="username"
            placeholder="Tu usuario"
            class="form-input"
            autocomplete="username"
            autofocus
          >
        </div>
      </div>

      <div class="form-grupo">
        <label class="form-label">Contraseña</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input
            type="password"
            name="password"
            placeholder="Tu contraseña"
            class="form-input"
            autocomplete="current-password"
          >
        </div>
      </div>

      <button type="submit" class="btn-login">
        Ingresar
      </button>

    </form>
  </div>

  <!-- FOOTER -->
  <div class="login-footer">
    Fuerza Natural Broker &copy; {% now "Y" %}
  </div>

</div>

</body>
</html>
