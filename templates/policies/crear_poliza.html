{% extends "base.html" %}
{% block content %}

<style>
  /* Ajustes quirúrgicos para mejorar la legibilidad de los campos */
  .form-grupo { margin-bottom: 20px; }
  .form-grupo label { 
    display: block; 
    margin-bottom: 8px; 
    color: var(--text-secondary); 
    font-size: 12px; 
    font-weight: 600; 
    text-transform: uppercase; 
    letter-spacing: 0.5px;
    opacity: 0.9;
  }
  .form-control {
    background: rgba(255, 255, 255, 0.03) !important;
    border: 1px solid var(--border) !important;
    padding: 12px !important;
    border-radius: var(--radius-sm) !important;
    color: var(--text-primary) !important;
  }
  .form-control:focus {
    border-color: var(--green-400) !important;
    background: rgba(52, 211, 100, 0.05) !important;
  }
  .form-section-title {
    margin-top: 10px;
    margin-bottom: 25px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  /* FIX QUIRÚRGICO: Contraste para selectores */
  select option {
    background-color: #ffffff !important;
    color: #1a1a1a !important;
  }
</style>

<div class="page-header">
  <div>
    <h1 class="page-title">Nueva póliza</h1>
    <p class="page-subtitle">Completá los datos para registrar una nueva póliza</p>
  </div>
</div>

{% if error %}
<div class="card" style="margin-bottom: 16px; border-color: rgba(239,68,68,0.25);">
  <div style="color:#fecaca; font-size:13px; font-weight:600;">
    {{ error }}
  </div>
</div>
{% endif %}

<div class="form-layout">
  <div class="card form-card">
    <form method="post" enctype="multipart/form-data" id="form-poliza">
      {% csrf_token %}

      <!-- CAMPO OCULTO: Seteamos la categoría como OTRO automáticamente para la DB -->
      <input type="hidden" name="tipo_poliza" value="OTRO">

      <div class="form-section">
        <div class="form-section-title titulo-pro">
          Cliente y póliza
          <div class="sub-line"></div>
        </div>

        <!-- FILA 1: CLIENTE, N° PÓLIZA Y RENOVACIÓN DE -->
        <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;">
          <div class="form-grupo">
            <label>Cliente</label>
            <select name="client" class="form-control required" required>
              <option value="">Seleccionar cliente</option>
              {% for cliente in clientes %}
              <option value="{{ cliente.id }}"
                {% if cliente.id|stringformat:"s" == cliente_id %}selected{% endif %}>
                {{ cliente }}
              </option>
              {% endfor %}
            </select>
          </div>

          <div class="form-grupo">
            <label>N° Póliza</label>
            <input type="text" name="policy_number" class="form-control required" required placeholder="Ej: 123456789">
          </div>

          <div class="form-grupo">
            <label style="color: var(--green-400);">¿Es renovación de...?</label>
            <select name="renovacion_de" class="form-control">
              <option value="">Ninguna (Póliza nueva)</option>
              {% for pol in polizas %}
              <option value="{{ pol.id }}">
                N° {{ pol.policy_number }} - {{ pol.client }} ({{ pol.company|default:"Sin compañía" }})
              </option>
              {% endfor %}
            </select>
          </div>
        </div>

        <!-- FILA 2: PATENTE Y COMPAÑÍA -->
        <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 15px;">
          <div class="form-grupo">
            <label style="color: var(--green-400);">Patente / Dominio</label>
            <input type="text" name="patente" class="form-control" placeholder="Ej: ABC123 o AF123JK">
          </div>

          <div class="form-grupo">
            <label>Compañía</label>
            <select name="company" class="form-control required" required>
              <option value="">Seleccionar compañía</option>
              {% for c in companias %}
              <option value="{{ c.id }}">{{ c.nombre }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <!-- FILA 3: RIESGO DINÁMICO -->
        <div class="form-row" style="margin-top: 15px;">
          <div class="form-grupo" style="max-width: 50%;">
            <label>Tipo de Riesgo (Dinámico)</label>
            <select name="risk_type" class="form-control">
              <option value="">Seleccionar riesgo...</option>
              {% for r in riesgos %}
                <option value="{{ r.id }}">{{ r.nombre }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
      </div>

      <div class="form-section" style="margin-top: 30px;">
        <div class="form-section-title titulo-pro">
          Vigencia de Póliza
          <div class="sub-line"></div>
        </div>

        <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
          <div class="form-grupo">
            <label>Fecha de inicio</label>
            <input type="date" name="start_date" class="form-control required" required>
          </div>
          <div class="form-grupo">
            <label>Fecha de vencimiento</label>
            <input type="date" name="end_date" class="form-control required" required>
          </div>
        </div>
      </div>

      <div class="form-section" style="margin-top: 30px;">
        <div class="form-section-title titulo-pro">
          Facturación y Cobro
          <div class="sub-line"></div>
        </div>

        <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px;">
          <div class="form-grupo">
            <label>Método de Pago</label>
            <select name="forma_pago" id="forma_pago" class="form-control" onchange="toggleCuponeraFields()">
              <option value="TARJETA">Tarjeta de crédito</option>
              <option value="CBU">Débito / CBU</option>
              <option value="CUPONERA">Cuponera de pago</option>
            </select>
          </div>

          <div class="form-grupo">
            <label id="label_vencimiento">Inicio vencimiento pago</label>
            <input type="date" name="fecha_primer_vencimiento_cuponera" id="fecha_primer_vencimiento_cuponera" class="form-control">
          </div>

          <div class="form-grupo">
            <label>Frecuencia de Refacturación</label>
            <select name="frecuencia_cuponera" id="frecuencia_cuponera" class="form-control">
              <option value="1">Mensual</option>
              <option value="3">Trimestral</option>
              <option value="4">Cuatrimestral</option>
              <option value="6">Semestral</option>
              <option value="12">Anual</option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-section" style="margin-top: 30px;">
        <div class="form-section-title titulo-pro">
          Documentos
          <div class="sub-line"></div>
        </div>

        <div class="upload-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
          <input type="file" id="pdf_poliza" name="pdf_poliza" accept=".pdf,application/pdf" class="file-input-hidden" onchange="mostrarNombre(this, 'poliza_nombre')">
          <label for="pdf_poliza" class="drop-zone drop-zone-premium" style="border: 1px dashed var(--border); padding: 20px; text-align: center; border-radius: 12px; cursor: pointer;">
            <div class="drop-icon" style="font-size: 24px; margin-bottom: 10px;">📄</div>
            <strong>Subir póliza</strong>
            <div id="poliza_nombre" style="font-size: 11px; color: var(--text-muted); margin-top: 8px;">Ningún archivo seleccionado</div>
          </label>

          <input type="file" id="cuponera_pdf" name="cuponera_pdf" accept=".pdf,application/pdf" class="file-input-hidden" onchange="mostrarNombre(this, 'cuponera_nombre')">
          <label for="cuponera_pdf" class="drop-zone drop-zone-premium" style="border: 1px dashed var(--border); padding: 20px; text-align: center; border-radius: 12px; cursor: pointer;">
            <div class="drop-icon" style="font-size: 24px; margin-bottom: 10px;">💳</div>
            <strong>Subir cuponera</strong>
            <div id="cuponera_nombre" style="font-size: 11px; color: var(--text-muted); margin-top: 8px;">Ningún archivo seleccionado</div>
          </label>
        </div>
      </div>

      <div class="form-actions" style="margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 15px;">
        <a href="/polizas/" class="btn btn-ghost">Cancelar</a>
        <button type="submit" class="btn btn-primary btn-pro" style="padding: 12px 30px;">
          Guardar póliza
        </button>
      </div>
    </form>
  </div>
</div>

<script>
function mostrarNombre(input, id) {
  var el = document.getElementById(id);
  if (input.files && input.files.length > 0) {
    el.innerText = input.files[0].name;
    el.style.color = "var(--green-400)";
  } else {
    el.innerText = "Ningún archivo seleccionado";
    el.style.color = "var(--text-muted)";
  }
}

function toggleCuponeraFields() {
  var formaPago = document.getElementById('forma_pago').value;
  var inputVenc = document.getElementById('fecha_primer_vencimiento_cuponera');
  var labelVenc = document.getElementById('label_vencimiento');
  
  if (formaPago === 'CUPONERA') {
    inputVenc.required = true;
    labelVenc.innerText = "Inicio vencimiento pago *";
    labelVenc.style.color = "var(--green-400)";
  } else {
    inputVenc.required = false;
    labelVenc.innerText = "Inicio vencimiento pago";
    labelVenc.style.color = "var(--text-secondary)";
  }
}

document.addEventListener('DOMContentLoaded', toggleCuponeraFields);
</script>

{% endblock %}
