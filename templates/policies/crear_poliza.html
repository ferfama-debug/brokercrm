{% extends "base.html" %}

{% block content %}

<style>

.form-poliza{
max-width:600px;
}

.form-grupo{
margin-bottom:16px;
}

.form-grupo label{
display:block;
font-weight:bold;
margin-bottom:6px;
}

.form-grupo input,
.form-grupo select{
width:100%;
padding:8px;
border:1px solid #ddd;
border-radius:4px;
font-size:14px;
}

</style>


<h1>➕ Nueva póliza</h1>


<div class="card form-poliza">

<form method="post" enctype="multipart/form-data">

{% csrf_token %}


<div class="form-grupo">

<label>Cliente</label>

<select name="client">

{% for cliente in clientes %}

{% if cliente.id|stringformat:"s" == cliente_id %}

<option value="{{ cliente.id }}" selected>
{{ cliente }}
</option>

{% else %}

<option value="{{ cliente.id }}">
{{ cliente }}
</option>

{% endif %}

{% endfor %}

</select>

</div>


<div class="form-grupo">

<label>N° Póliza</label>

<input type="text" name="policy_number">

</div>


<div class="form-grupo">

<label>Compañía</label>

<input type="text" name="company">

</div>


<div class="form-grupo">

<label>Tipo de póliza</label>

<select name="tipo_poliza">

<option value="AUTO">Auto</option>
<option value="MOTO">Moto</option>
<option value="HOGAR">Hogar</option>
<option value="VIDA">Vida</option>
<option value="COMERCIO">Comercio</option>
<option value="AP">Accidentes Personales</option>
<option value="RC">Responsabilidad Civil</option>
<option value="OTRO">Otro</option>

</select>

</div>


<div class="form-grupo">

<label>Fecha inicio</label>

<input type="date" name="start_date">

</div>


<div class="form-grupo">

<label>Fecha vencimiento</label>

<input type="date" name="end_date">

</div>


<div class="form-grupo">

<label>Forma de pago</label>

<select name="forma_pago" id="forma_pago">

<option value="TARJETA">Tarjeta de crédito</option>
<option value="CBU">Débito / CBU</option>
<option value="CUPONERA">Cuponera de pago</option>

</select>

</div>


<div class="form-grupo" id="grupo_frecuencia" style="display:none;">

<label>Frecuencia de cuponera</label>

<select name="frecuencia_cuponera">

<option value="">Seleccione frecuencia</option>
<option value="1">Mensual</option>
<option value="3">Trimestral</option>
<option value="4">Cuatrimestral</option>
<option value="6">Semestral</option>
<option value="12">Anual</option>

</select>

</div>


<div class="form-grupo">

<label>PDF de la póliza</label>

<input type="file" name="pdf_poliza" accept="application/pdf">

</div>


<div class="form-grupo">

<label>Cuponera de pago (solo si corresponde)</label>

<input type="file" name="cuponera_pdf" accept="application/pdf">

</div>


<button type="submit" class="btn btn-primary">
Guardar póliza
</button>


</form>

</div>


<script>

const formaPago = document.getElementById("forma_pago");
const grupoFrecuencia = document.getElementById("grupo_frecuencia");

function toggleFrecuencia(){

if(formaPago.value === "CUPONERA"){
grupoFrecuencia.style.display = "block";
}else{
grupoFrecuencia.style.display = "none";
}

}

formaPago.addEventListener("change", toggleFrecuencia);

window.onload = toggleFrecuencia;

</script>

{% endblock %}
