{% extends "base.html" %}
{% block content %}

<style>
  .form-grupo { margin-bottom: 20px; }
  .form-grupo label { 
    display: block; 
    margin-bottom: 8px; 
    color: var(--text-secondary); 
    font-size: 12px; 
    font-weight: 600; 
    text-transform: uppercase; 
    letter-spacing: 0.5px;
    opacity: 0.9;
  }
  .form-control {
    background: rgba(255, 255, 255, 0.03) !important;
    border: 1px solid var(--border) !important;
    padding: 12px !important;
    border-radius: var(--radius-sm) !important;
    color: var(--text-primary) !important;
    width: 100%;
  }
  .form-control:focus {
    border-color: var(--green-400) !important;
    background: rgba(52, 211, 100, 0.05) !important;
  }
  
  /* Sistema de Pestañas */
  .tabs-nav {
    display: flex;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 25px;
    padding-bottom: 0;
    list-style: none;
  }
  .tab-btn {
    background: transparent;
    border: none;
    padding: 12px 18px;
    color: var(--text-secondary);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s ease;
  }
  .tab-btn:hover {
    color: var(--text-primary);
  }
  .tab-btn.active {
    color: var(--green-400);
    border-bottom-color: var(--green-400);
  }
  .tab-content {
    display: none;
  }
  .tab-content.active {
    display: block;
  }

  select option {
    background-color: #ffffff !important;
    color: #1a1a1a !important;
  }
</style>

<div class="page-header">
  <div>
    <h1 class="page-title">Nueva póliza</h1>
    <p class="page-subtitle">Completá los datos para registrar una nueva póliza</p>
  </div>
</div>

{% if error %}
<div class="card" style="margin-bottom: 16px; border-color: rgba(239,68,68,0.25);">
  <div style="color:#fecaca; font-size:13px; font-weight:600;">
    {{ error }}
  </div>
</div>
{% endif %}

<div class="form-layout">
  <div class="card form-card">
    <form method="post" enctype="multipart/form-data" id="form-poliza">
      {% csrf_token %}

      <!-- PESTAÑAS DE NAVEGACIÓN -->
      <div class="tabs-nav">
        <button type="button" class="tab-btn active" onclick="switchTab(event, 'tab-basica')">Información Básica</button>
        <button type="button" class="tab-btn" onclick="switchTab(event, 'tab-vigencia')">Vigencia de Póliza</button>
        <button type="button" class="tab-btn" onclick="switchTab(event, 'tab-pagos')">Configuración de Pagos</button>
        <button type="button" class="tab-btn" onclick="switchTab(event, 'tab-docs')">Documentación y Alertas</button>
      </div>

      <!-- PESTAÑA 1: INFORMACIÓN BÁSICA -->
      <div id="tab-basica" class="tab-content active">
        <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
          <div class="form-grupo">
            <label>Cliente *</label>
            <select name="client" class="form-control required" required>
              <option value="">Seleccionar cliente</option>
              {% for cliente in clientes %}
              <option value="{{ cliente.id }}" {% if cliente.id|stringformat:"s" == cliente_id %}selected{% endif %}>
                {{ cliente }}
              </option>
              {% endfor %}
            </select>
          </div>

          <div class="form-grupo">
            <label>Compañía *</label>
            <select name="company" class="form-control required" required>
              <option value="">Seleccionar compañía</option>
              {% for c in companias %}
              <option value="{{ c.id }}">{{ c.nombre }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 15px;">
          <div class="form-grupo">
            <label>Número de póliza *</label>
            <input type="text" name="policy_number" class="form-control required" required placeholder="Ej: 123456789">
          </div>

          <div class="form-grupo">
            <label style="color: var(--green-400);">Renueva a la póliza anterior</label>
            <select name="renovacion_de" class="form-control">
              <option value="">--------- (Póliza nueva)</option>
              {% for pol in polizas %}
              <option value="{{ pol.id }}">N° {{ pol.policy_number }} - {{ pol.client }} ({{ pol.company|default:"Sin compañía" }})</option>
              {% endfor %}
            </select>
            <small style="color: var(--text-secondary); font-size: 11px;">Seleccione la póliza anterior correspondiente al mismo bien en caso de renovación.</small>
          </div>
        </div>

        <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 15px;">
          <div class="form-grupo">
            <label style="color: var(--green-400);">Patente / Dominio</label>
            <input type="text" name="patente" class="form-control" placeholder="Ej: HDS434">
          </div>

          <div class="form-grupo">
            <label>Tipo de Riesgo (Dinámico)</label>
            <select name="risk_type" class="form-control">
              <option value="">Seleccionar riesgo...</option>
              {% for r in riesgos %}
              <option value="{{ r.id }}">{{ r.nombre }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="form-grupo">
            <label>Tipo de póliza (Categoría) *</label>
            <select name="tipo_poliza" class="form-control">
              <option value="AUTO">Auto</option>
              <option value="MOTO">Moto</option>
              <option value="HOGAR">Hogar</option>
              <option value="VIDA">Vida</option>
              <option value="COMERCIO">Comercio</option>
              <option value="AP">Accidentes Personales</option>
              <option value="RC">Responsabilidad Civil</option>
              <option value="OTRO">Otro</option>
            </select>
          </div>
        </div>

        <!-- CAMPOS DE VEHÍCULO -->
        <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 15px; margin-top: 15px;">
          <div class="form-grupo">
            <label>Marca del Auto</label>
            <input type="text" name="marca" class="form-control" placeholder="Ej: Volkswagen">
          </div>
          <div class="form-grupo">
            <label>Modelo</label>
            <input type="text" name="modelo" class="form-control" placeholder="Ej: Gol Trend">
          </div>
          <div class="form-grupo">
            <label>Versión</label>
            <input type="text" name="version_auto" class="form-control" placeholder="Ej: 1.6 Highline">
          </div>
          <div class="form-grupo">
            <label>Año</label>
            <input type="text" name="anio_auto" class="form-control" placeholder="Ej: 2022">
          </div>
        </div>

        <div class="form-row" style="margin-top: 15px;">
          <div class="form-grupo">
            <label>Detalle del seguro</label>
            <input type="text" name="detalle_seguro" class="form-control" placeholder="Ej: Cobertura contra terceros completo">
          </div>
        </div>
      </div>

      <!-- PESTAÑA 2: VIGENCIA DE PÓLIZA -->
      <div id="tab-vigencia" class="tab-content">
        <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
          <div class="form-grupo">
            <label>Fecha de inicio *</label>
            <input type="date" name="start_date" class="form-control required" required>
          </div>
          <div class="form-grupo">
            <label>Fecha de vencimiento *</label>
            <input type="date" name="end_date" class="form-control required" required>
          </div>
        </div>
      </div>

      <!-- PESTAÑA 3: CONFIGURACIÓN DE PAGOS -->
      <div id="tab-pagos" class="tab-content">
        <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px;">
          <div class="form-grupo">
            <label>Método de Pago</label>
            <select name="forma_pago" id="forma_pago" class="form-control" onchange="toggleCuponeraFields()">
              <option value="TARJETA">Tarjeta de crédito</option>
              <option value="CBU">Débito / CBU</option>
              <option value="CUPONERA">Cuponera de pago</option>
            </select>
          </div>

          <div class="form-grupo">
            <label id="label_vencimiento">Inicio vencimiento pago</label>
            <input type="date" name="fecha_primer_vencimiento_cuponera" id="fecha_primer_vencimiento_cuponera" class="form-control">
          </div>

          <div class="form-grupo">
            <label>Frecuencia de Refacturación</label>
            <select name="frecuencia_cuponera" id="frecuencia_cuponera" class="form-control">
              <option value="1">Mensual</option>
              <option value="3">Trimestral</option>
              <option value="4">Cuatrimestral</option>
              <option value="6">Semestral</option>
              <option value="12">Anual</option>
            </select>
          </div>
        </div>
      </div>

      <!-- PESTAÑA 4: DOCUMENTACIÓN Y ALERTAS -->
      <div id="tab-docs" class="tab-content">
        <div class="upload-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
          <input type="file" id="pdf_poliza" name="pdf_poliza" accept=".pdf,application/pdf" class="file-input-hidden" onchange="mostrarNombre(this, 'poliza_nombre')">
          <label for="pdf_poliza" class="drop-zone drop-zone-premium" style="border: 1px dashed var(--border); padding: 20px; text-align: center; border-radius: 12px; cursor: pointer; display: block;">
            <div class="drop-icon" style="font-size: 24px; margin-bottom: 10px;">📄</div>
            <strong>Subir póliza</strong>
            <div id="poliza_nombre" style="font-size: 11px; color: var(--text-muted); margin-top: 8px;">Ningún archivo seleccionado</div>
          </label>

          <input type="file" id="cuponera_pdf" name="cuponera_pdf" accept=".pdf,application/pdf" class="file-input-hidden" onchange="mostrarNombre(this, 'cuponera_nombre')">
          <label for="cuponera_pdf" class="drop-zone drop-zone-premium" style="border: 1px dashed var(--border); padding: 20px; text-align: center; border-radius: 12px; cursor: pointer; display: block;">
            <div class="drop-icon" style="font-size: 24px; margin-bottom: 10px;">💳</div>
            <strong>Subir cuponera</strong>
            <div id="cuponera_nombre" style="font-size: 11px; color: var(--text-muted); margin-top: 8px;">Ningún archivo seleccionado</div>
          </label>
        </div>
      </div>

      <!-- ACCIONES GLOBALES -->
      <div class="form-actions" style="margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 15px;">
        <a href="/polizas/" class="btn btn-ghost">Cancelar</a>
        <button type="submit" class="btn btn-primary btn-pro" style="padding: 12px 30px;">
          Guardar póliza
        </button>
      </div>
    </form>
  </div>
</div>

<script>
function switchTab(evt, tabId) {
  var contents = document.getElementsByClassName("tab-content");
  for (var i = 0; i < contents.length; i++) {
    contents[i].classList.remove("active");
  }
  var buttons = document.getElementsByClassName("tab-btn");
  for (var i = 0; i < buttons.length; i++) {
    buttons[i].classList.remove("active");
  }
  document.getElementById(tabId).classList.add("active");
  evt.currentTarget.classList.add("active");
}

function mostrarNombre(input, id) {
  var el = document.getElementById(id);
  if (input.files && input.files.length > 0) {
    el.innerText = input.files[0].name;
    el.style.color = "var(--green-400)";
  } else {
    el.innerText = "Ningún archivo seleccionado";
    el.style.color = "var(--text-muted)";
  }
}

function toggleCuponeraFields() {
  var formaPago = document.getElementById('forma_pago').value;
  var inputVenc = document.getElementById('fecha_primer_vencimiento_cuponera');
  var labelVenc = document.getElementById('label_vencimiento');
  
  if (formaPago === 'CUPONERA') {
    inputVenc.required = true;
    labelVenc.innerText = "Inicio vencimiento pago *";
    labelVenc.style.color = "var(--green-400)";
  } else {
    inputVenc.required = false;
    labelVenc.innerText = "Inicio vencimiento pago";
    labelVenc.style.color = "var(--text-secondary)";
  }
}

document.addEventListener('DOMContentLoaded', toggleCuponeraFields);
</script>

{% endblock %}
