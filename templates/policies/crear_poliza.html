{% extends "base.html" %}
{% block content %}

<div class="page-header">
  <div>
    <h1 class="page-title">Nueva póliza</h1>
    <p class="page-subtitle">Completá los datos para registrar una nueva póliza</p>
  </div>
  <a href="/polizas/" class="btn btn-ghost">← Volver</a>
</div>

{% if error %}
<div class="card" style="margin-bottom: 16px; border-color: rgba(239,68,68,0.25);">
  <div style="color:#fecaca; font-size:13px; font-weight:600;">
    {{ error }}
  </div>
</div>
{% endif %}

<div class="form-layout">
  <div class="card form-card">
    <form method="post" enctype="multipart/form-data" id="form-poliza">
      {% csrf_token %}

      <!-- CLIENTE -->
      <div class="form-section">
        <div class="form-section-title titulo-pro">
          Cliente y póliza
          <div class="sub-line"></div>
        </div>

        <div class="form-row">
          <div class="form-grupo">
            <label>Cliente</label>
            <select name="client" class="form-control required" required>
              <option value="">Seleccionar cliente</option>
              {% for cliente in clientes %}
              <option value="{{ cliente.id }}"
                {% if cliente.id|stringformat:"s" == cliente_id %}selected{% endif %}>
                {{ cliente }}
              </option>
              {% endfor %}
            </select>
          </div>

          <div class="form-grupo">
            <label>N° Póliza</label>
            <input type="text" name="policy_number" class="form-control required" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-grupo">
            <label>Compañía</label>
            <select name="company" class="form-control required" required>
              <option value="">Seleccionar compañía</option>
              {% for c in companias %}
              <option value="{{ c.id }}">{{ c.nombre }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="form-grupo">
            <label>Tipo</label>
            <select name="tipo_poliza" class="form-control">
              <option value="AUTO">Auto</option>
              <option value="MOTO">Moto</option>
              <option value="HOGAR">Hogar</option>
              <option value="VIDA">Vida</option>
              <option value="COMERCIO">Comercio</option>
              <option value="AP">Accidentes Personales</option>
              <option value="RC">Responsabilidad Civil</option>
            </select>
          </div>
        </div>
      </div>

      <!-- VIGENCIA -->
      <div class="form-section">
        <div class="form-section-title titulo-pro">
          Vigencia
          <div class="sub-line"></div>
        </div>

        <div class="form-row">
          <input type="date" name="start_date" class="form-control required" required>
          <input type="date" name="end_date" class="form-control required" required>
        </div>
      </div>

      <!-- PAGO -->
      <div class="form-section">
        <div class="form-section-title titulo-pro">
          Forma de pago
          <div class="sub-line"></div>
        </div>

        <div class="form-row">
          <select name="forma_pago" id="forma_pago" class="form-control">
            <option value="TARJETA">Tarjeta</option>
            <option value="CBU">CBU</option>
            <option value="CUPONERA">Cuponera</option>
          </select>

          <div id="grupo_frecuencia" style="display:none;">
            <select name="frecuencia_cuponera" id="frecuencia_cuponera" class="form-control">
              <option value="">Frecuencia</option>
              <option value="1">Mensual</option>
              <option value="3">Trimestral</option>
              <option value="6">Semestral</option>
              <option value="12">Anual</option>
            </select>
          </div>
        </div>
      </div>

      <!-- DOCUMENTOS -->
      <div class="form-section">
        <div class="form-section-title titulo-pro">
          Documentos
          <div class="sub-line"></div>
        </div>

        <div class="upload-grid">
          <input
            type="file"
            id="pdf_poliza"
            name="pdf_poliza"
            accept=".pdf,application/pdf"
            class="file-input-hidden"
            onchange="mostrarNombre(this, 'poliza_nombre')"
          >

          <label for="pdf_poliza" class="drop-zone drop-zone-premium">
            <div class="drop-icon">📄</div>
            <div class="drop-content">
              <strong>Subir póliza</strong>
              <span>PDF de la póliza principal</span>
            </div>
            <div id="poliza_nombre" class="file-badge file-badge-empty">Ningún archivo seleccionado</div>
          </label>

          <input
            type="file"
            id="cuponera_pdf"
            name="cuponera_pdf"
            accept=".pdf,application/pdf"
            class="file-input-hidden"
            onchange="mostrarNombre(this, 'cuponera_nombre')"
          >

          <label for="cuponera_pdf" class="drop-zone drop-zone-premium">
            <div class="drop-icon">💳</div>
            <div class="drop-content">
              <strong>Subir cuponera</strong>
              <span>PDF con cuotas o medios de pago</span>
            </div>
            <div id="cuponera_nombre" class="file-badge file-badge-empty">Ningún archivo seleccionado</div>
          </label>
        </div>
      </div>

      <div class="form-actions">
        <a href="/polizas/" class="btn btn-ghost">Cancelar</a>
        <button type="submit" class="btn btn-primary btn-pro" onclick="console.log('🔥 FORM SUBMIT CLICK')">
          Guardar póliza
        </button>
      </div>

    </form>
  </div>
</div>

<style>
.form-section { margin-bottom: 36px; }

.titulo-pro {
  font-size: 14px;
  font-weight: 600;
  color: #d1fae5;
  margin-bottom: 18px;
}

.sub-line {
  width: 40px;
  height: 2px;
  background: #22c55e;
  margin-top: 6px;
  border-radius: 2px;
}

.upload-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 18px;
  align-items: stretch;
}

.file-input-hidden {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.drop-zone {
  border: 1px dashed rgba(52,211,100,0.4);
  padding: 18px;
  text-align: center;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.25s;
  background: rgba(52,211,100,0.02);
}

.drop-zone:hover {
  border-color: #22c55e;
  background: rgba(34,197,94,0.08);
  transform: translateY(-2px);
}

.drop-zone-premium {
  min-height: 168px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 24px 18px;
  border: 1px dashed rgba(52,211,100,0.34);
  background:
    linear-gradient(180deg, rgba(52,211,100,0.055) 0%, rgba(52,211,100,0.025) 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.03),
    0 10px 30px rgba(0,0,0,0.12);
}

.drop-zone-premium:hover {
  border-color: rgba(74,222,128,0.8);
  background:
    linear-gradient(180deg, rgba(52,211,100,0.09) 0%, rgba(52,211,100,0.045) 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.04),
    0 14px 34px rgba(0,0,0,0.18);
  transform: translateY(-3px);
}

.drop-icon {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(34,197,94,0.12);
  border: 1px solid rgba(34,197,94,0.18);
  font-size: 22px;
  line-height: 1;
}

.drop-content strong {
  display: block;
  font-size: 14px;
  color: #f0fdf4;
  margin-bottom: 4px;
}

.drop-content span {
  font-size: 11px;
  color: #94a3b8;
}

.file-badge {
  margin-top: 2px;
  padding: 6px 10px;
  background: #22c55e;
  color: #022c22;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 600;
  display: inline-block;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.file-badge-empty {
  background: rgba(148,163,184,0.18);
  color: #cbd5e1;
}

.form-actions {
  margin-top: 8px;
}

.btn-pro {
  transition: 0.2s;
}
.btn-pro:hover {
  transform: scale(1.06);
  box-shadow: 0 0 12px rgba(34,197,94,0.4);
}

@media (max-width: 700px) {
  .upload-grid {
    grid-template-columns: 1fr;
  }

  .drop-zone-premium {
    min-height: 150px;
  }
}
</style>

<script>
function mostrarNombre(input, id) {
  var el = document.getElementById(id);

  if (input.files && input.files.length > 0) {
    el.innerText = input.files[0].name;
    el.classList.remove("file-badge-empty");
  } else {
    el.innerText = "Ningún archivo seleccionado";
    el.classList.add("file-badge-empty");
  }
}

const formaPago = document.getElementById("forma_pago");
const grupoFrecuencia = document.getElementById("grupo_frecuencia");
const frecuencia = document.getElementById("frecuencia_cuponera");

function toggleFrecuencia() {
  if (formaPago.value === "CUPONERA") {
    grupoFrecuencia.style.display = "block";
  } else {
    grupoFrecuencia.style.display = "none";
    frecuencia.value = "";
  }
}

formaPago.addEventListener("change", toggleFrecuencia);
document.addEventListener("DOMContentLoaded", toggleFrecuencia);

// 🔥 DEBUG SUBMIT REAL
document.getElementById("form-poliza").addEventListener("submit", function() {
  console.log("🚀 FORM ENVIADO");
});
</script>

{% endblock %}
