{% extends "base.html" %}

{% block content %}

<style>

.form-renovar{
max-width:600px;
}

.form-grupo{
margin-bottom:16px;
}

.form-grupo label{
display:block;
font-weight:bold;
margin-bottom:6px;
}

.form-grupo input{
padding:8px;
border:1px solid #ddd;
border-radius:4px;
width:100%;
font-size:14px;
}

.info-poliza{
margin-bottom:20px;
}

.info-poliza p{
margin:6px 0;
}

</style>


<h1>🔁 Renovar póliza</h1>


<div class="card info-poliza">

<p><strong>Cliente:</strong> {{ poliza.client }}</p>
<p><strong>Compañía:</strong> {{ poliza.company }}</p>
<p><strong>Tipo:</strong> {{ poliza.tipo_poliza }}</p>
<p><strong>Póliza actual:</strong> {{ poliza.policy_number }}</p>

</div>


<div class="card form-renovar">

<form method="post" enctype="multipart/form-data">

{% csrf_token %}


<div class="form-grupo">

<label>N° nueva póliza</label>

<input
type="text"
name="policy_number"
value="{{ poliza.policy_number }}"
>

</div>


<div class="form-grupo">

<label>Fecha inicio</label>

<input
type="date"
name="start_date"
>

</div>


<div class="form-grupo">

<label>Fecha vencimiento</label>

<input
type="date"
name="end_date"
>

</div>


<div class="form-grupo">

<label>Nuevo PDF de póliza</label>

<input
type="file"
name="pdf_poliza"
accept="application/pdf"
>

</div>


<button type="submit" class="btn btn-primary">
Guardar renovación
</button>

</form>

</div>

{% endblock %}
