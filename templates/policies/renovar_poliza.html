{% extends "base.html" %}

{% block content %}

<h1>🔁 Renovar póliza</h1>

<div style="background:white;padding:20px;margin-bottom:20px;border-radius:6px;">

<p><strong>Cliente:</strong> {{ poliza.client }}</p>
<p><strong>Compañía:</strong> {{ poliza.company }}</p>
<p><strong>Tipo:</strong> {{ poliza.tipo_poliza }}</p>
<p><strong>Póliza actual:</strong> {{ poliza.policy_number }}</p>

</div>

<form method="post" enctype="multipart/form-data"
style="background:white;padding:20px;border-radius:6px;">

{% csrf_token %}

<div style="margin-bottom:15px;">
<label>N° nueva póliza</label><br>
<input type="text" name="policy_number"
value="{{ poliza.policy_number }}"
style="width:300px;padding:8px;">
</div>

<div style="margin-bottom:15px;">
<label>Fecha inicio</label><br>
<input type="date" name="start_date"
style="padding:8px;">
</div>

<div style="margin-bottom:15px;">
<label>Fecha vencimiento</label><br>
<input type="date" name="end_date"
style="padding:8px;">
</div>

<div style="margin-bottom:15px;">
<label>Nuevo PDF de póliza</label><br>
<input type="file" name="pdf_poliza">
</div>

<button type="submit"
style="padding:10px 20px;background:#2c3e50;color:white;border:none;border-radius:4px;">
Guardar renovación
</button>

</form>

{% endblock %}
