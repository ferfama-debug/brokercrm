{% extends "base.html" %}
{% block content %}

<div class="home-wrap">

  <!-- Isotipo grande -->
  <svg class="home-isotipo" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="64" height="64" rx="16" fill="#0a1f12"/>
    <path d="M32 8 C32 8, 52 16, 52 34 C52 46, 41 51, 32 49 C23 51, 12 46, 12 34 C12 16, 32 8 Z"
          fill="#15803d" opacity="0.9"/>
    <path d="M32 49 L32 16" stroke="#34d364" stroke-width="2" stroke-linecap="round"/>
    <path d="M32 38 Q24 35, 18 36" stroke="#34d364" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
    <path d="M32 30 Q40 27, 46 28" stroke="#34d364" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
    <path d="M32 44 Q40 41, 46 42" stroke="#34d364" stroke-width="1.4" stroke-linecap="round" opacity="0.6"/>
  </svg>

  <h1 class="home-titulo">Bienvenido al CRM</h1>
  <p class="home-subtitulo">Fuerza Natural Broker de Seguros</p>

  <div class="home-acciones">
    <a href="/" class="btn btn-primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      Ir al dashboard
    </a>
    <a href="/admin/" class="btn btn-secondary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
      </svg>
      Panel de administración
    </a>
  </div>

</div>

<style>

.home-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - var(--topbar-h) - 80px);
  text-align: center;
  gap: 12px;
}

.home-isotipo {
  width: 72px;
  height: 72px;
  margin-bottom: 8px;
}

.home-titulo {
  font-size: 28px;
  font-weight: 600;
  color: #ecfdf5;
  letter-spacing: -0.02em;
}

.home-subtitulo {
  font-size: 14px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}

.home-acciones {
  display: flex;
  gap: 12px;
  margin-top: 16px;
  flex-wrap: wrap;
  justify-content: center;
}

</style>

{% endblock %}
