<div style="max-width: 500px; margin: 50px auto; font-family: Arial, sans-serif; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">
    <h2>Actualización Obligatoria de Contraseña</h2>
    <p style="color: #666;">Por razones de seguridad, debes actualizar tu contraseña antes de continuar al CRM.</p>
    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="background-color: #28a745; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px;">
            Guardar Nueva Contraseña
        </button>
    </form>
</div>
